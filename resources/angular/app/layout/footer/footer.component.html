<footer class="footer" dir="rtl">
  <div class="footer__inner">
    <div class="footer__brand">
      <img src="/images/curtainsart/logo.svg" alt="مصنع فن الستارة" class="footer__logo" />
      <p class="footer__desc">{{ footerDesc() }}</p>
    </div>

    <div class="footer__contact">
      <h4>تواصل معنا</h4>
      <p>{{ footerAddress() }}</p>
      <a [href]="'tel:' + phone()">{{ phone() }}</a>
      <a href="https://wa.me/966554373327" target="_blank" rel="noopener">واتساب</a>
    </div>

    <div class="footer__social">
      <h4>تابعنا</h4>
      <div class="footer__social-links">
        @for (link of socialLinks(); track link.platform) {
          <a [href]="link.url" target="_blank" rel="noopener" class="footer__social-link">
            {{ link.platform }}
          </a>
        }
      </div>
    </div>
  </div>

  <div class="footer__bottom">
    <p>{{ copyright() }}</p>
  </div>
</footer>
