<div class="page contact-page" dir="rtl">
  <div class="page-hero"><h1>تواصل معنا</h1></div>

  <section class="contact-section">
    <div class="container contact-layout">

      <!-- Info column -->
      <div class="contact-info">
        <h2>بيانات التواصل</h2>
        <p><strong>العنوان:</strong> {{ address() }}</p>
        <p><strong>الهاتف:</strong> <a [href]="'tel:' + phone()">{{ phone() }}</a></p>
        <p>
          <a [href]="whatsapp()" target="_blank" rel="noopener" class="btn btn--whatsapp">
            تواصل عبر واتساب
          </a>
        </p>

        <!-- Map embed -->
        <div class="contact-map">
          <iframe
            src="https://maps.google.com/maps?q=24.7248,46.7481&z=15&output=embed"
            width="100%"
            height="250"
            style="border:0;border-radius:8px"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="موقع المصنع"
          ></iframe>
        </div>
      </div>

      <!-- Form column -->
      <div class="contact-form-wrap">
        @if (submitted()) {
          <div class="contact-success">
            <p>✓ شكراً لتواصلك معنا، سنرد عليك قريباً.</p>
          </div>
        } @else {
          <form (ngSubmit)="submit()" class="contact-form">
            <h2>أرسل رسالة</h2>

            @if (error()) {
              <div class="contact-form__error">{{ error() }}</div>
            }

            <div class="contact-form__field">
              <label for="name">الاسم</label>
              <input id="name" type="text" [value]="form().name"
                     (input)="updateField('name', $any($event.target).value)"
                     placeholder="اسمك الكريم" />
            </div>

            <div class="contact-form__field">
              <label for="phone">رقم الجوال</label>
              <input id="phone" type="tel" [value]="form().phone"
                     (input)="updateField('phone', $any($event.target).value)"
                     placeholder="+966 5x xxx xxxx" />
            </div>

            <div class="contact-form__field">
              <label for="message">الرسالة</label>
              <textarea id="message" rows="5" [value]="form().message"
                        (input)="updateField('message', $any($event.target).value)"
                        placeholder="اكتب رسالتك هنا…"></textarea>
            </div>

            <button type="submit" class="btn btn--primary" [disabled]="isSubmitting()">
              {{ isSubmitting() ? 'جارٍ الإرسال…' : 'إرسال الرسالة' }}
            </button>
          </form>
        }
      </div>

    </div>
  </section>
</div>
